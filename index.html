<!doctype html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1117" />
    <title>Forex TradingView</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 id="tajuk">Watchlist Forex</h1>
    </header>

    <main id="app"><!-- skrin dipaparkan di sini --></main>

    <nav class="bottomnav" aria-label="Navigasi utama">
      <a class="navbtn" data-rute="dashboard" href="#dashboard" aria-label="Dashboard">
        <span class="ikon" aria-hidden="true">📊</span><span>Skor</span>
      </a>
      <a class="navbtn aktif" data-rute="watchlist" href="#watchlist" aria-label="Watchlist">
        <span class="ikon" aria-hidden="true">📋</span><span>Watchlist</span>
      </a>
      <a class="navbtn" data-rute="screener" href="#screener" aria-label="Screener">
        <span class="ikon" aria-hidden="true">🔎</span><span>Screener</span>
      </a>
      <a class="navbtn" data-rute="calc" href="#calc" aria-label="Kalkulator">
        <span class="ikon" aria-hidden="true">🧮</span><span>Kalkulator</span>
      </a>
      <a class="navbtn" data-rute="alerts" href="#alerts" aria-label="Alert">
        <span class="ikon" aria-hidden="true">🔔</span><span>Alert</span>
      </a>
      <a class="navbtn" data-rute="jurnal" href="#jurnal" aria-label="Jurnal">
        <span class="ikon" aria-hidden="true">📒</span><span>Jurnal</span>
      </a>
    </nav>

    <div id="sw-toast" class="sw-toast" role="status" hidden>
      <span>✨ Versi baharu tersedia</span>
      <button id="sw-toast-btn" type="button">Muat semula</button>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
